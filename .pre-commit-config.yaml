---
repos:
  - repo: local
    hooks:
      - id: forbid-type-ignore
        name: forbid type ignore
        entry: bash
        args:
          - -c
          - 'if rg -n "#\s*type:\s*ignore" app tests; then echo "Found forbidden # type: ignore"; exit 1; fi'
        language: system
        pass_filenames: false
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-added-large-files
        args: ["--maxkb=1000"]
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: check-toml
      - id: check-yaml
        exclude: ^schemas/
      - id: debug-statements
      - id: sort-simple-yaml
      - id: trailing-whitespace
  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.4.24
    hooks:
      - id: uv-lock
        # args: [--locked]
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.12
    hooks:
      - id: ruff-format
        types_or: [python, pyi]
  - repo: local
    hooks:
      - id: forbid-type-ignore
        name: forbid type ignore
        entry: bash
        args:
          - -c
          - 'if rg -n "#\s*type:\s*ignore" app tests; then echo "Found forbidden # type: ignore"; exit 1; fi'
        language: system
        pass_filenames: false
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.2
    hooks:
      - id: mypy
        pass_filenames: false
        args: [".", "--check-untyped-defs", "--disallow-untyped-defs", "--strict"]
        additional_dependencies:
          - boto3
          - fastapi
          - google-cloud-bigquery
          - httpx
          - numpy
          - onnxruntime
          - orjson
          - pydantic
          - pytest
          - reactivex
          - redis
          - tenacity
          - toolz
          - toolz-stubs
          - uvicorn
